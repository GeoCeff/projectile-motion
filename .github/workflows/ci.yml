name: Static checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  javascript:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check app JavaScript syntax
        run: node --check mobile_app/app.js
